<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة ميدو ملك البسترما</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --surface-2: #2c2c2c;
            --accent: #ff4757; --accent-dark: #ff6b81; --text: #f1f2f6; --text-muted: #a4b0be;
            --gold: #fbc531; --green: #2ed573; --danger: #ff4757;
            --shadow: 0 8px 30px rgba(0,0,0,0.5);
            --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; user-select: none; }

        /* Login */
        #login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: var(--surface); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { margin-bottom: 30px; font-weight: 900; font-size: 1.8rem; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; outline: none; font-size: 1rem; transition: 0.3s; }
        .input-field:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }

        /* App Bar & Tabs */
        .app-header { position: fixed; top: 0; width: 100%; background: rgba(30,30,30,0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .app-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .app-title { font-weight: 900; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
        .icon-btn { background: transparent; color: var(--text); border: none; font-size: 1.4rem; cursor: pointer; padding: 5px; }
        
        .tabs { display: flex; overflow-x: auto; padding: 0 15px 10px; gap: 10px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--surface-2); color: var(--text-muted); border: none; padding: 8px 16px; border-radius: 50px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }

        /* Main Content */
        #admin-section { display: none; padding: 125px 15px 100px; max-width: 800px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--surface); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; position: relative; overflow: hidden; }
        .card:active { transform: scale(0.95); background: var(--surface-2); }
        .card-img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; border-radius: 50%; background: #222; padding: 5px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .card-title { font-weight: 800; font-size: 1rem; margin-bottom: 5px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .card-price { color: var(--green); font-weight: 900; font-size: 1.1rem; }
        .sort-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); font-size: 0.7rem; padding: 3px 6px; border-radius: 5px; color: var(--text-muted); }

        /* FAB */
        .fab { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; box-shadow: 0 10px 20px rgba(255,71,87,0.4); cursor: pointer; z-index: 90; transition: 0.2s; }
        .fab:active { transform: scale(0.9); }

        /* Bottom Sheets & Modals */
        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .sheet-overlay.active { opacity: 1; pointer-events: auto; }
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--surface); border-radius: 24px 24px 0 0; padding: 25px 20px; z-index: 1001; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2); box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .sheet.active { bottom: 0; }
        .sheet-indicator { width: 40px; height: 5px; background: #555; border-radius: 10px; margin: 0 auto 20px; }
        .sheet-title { font-weight: 900; font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        .sheet-btn { width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 1rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border: none; cursor: pointer; background: var(--surface-2); color: var(--text); }
        .sheet-btn i { font-size: 1.2rem; }
        .sheet-btn.danger { color: var(--danger); }
        .sheet-btn:active { background: #333; }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 20px; transform: translateY(100%); transition: 0.3s; overflow-y: auto; }
        .modal.active { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--green); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 800; z-index: 3000; transition: 0.4s; box-shadow: var(--shadow); white-space: nowrap;}
        #toast.show { transform: translateX(-50%) translateY(0); }
        
        /* ستايل السحب والإفلات */
        .drag-handle { position: absolute; top: 10px; left: 10px; color: var(--text-muted); font-size: 1.2rem; cursor: grab; padding: 5px; z-index: 10; }
        .drag-handle:active { cursor: grabbing; color: var(--accent); }
        .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="login-section">
        <div class="login-card">
            <h2>إدارة 👑 ميدو</h2>
            <input type="email" id="email" class="input-field" placeholder="الإيميل">
            <input type="password" id="password" class="input-field" placeholder="كلمة السر">
            <button class="btn" id="loginBtn">دخول</button>
        </div>
    </div>

    <div id="admin-section">
        <div class="app-header">
            <div class="app-bar">
                <div class="app-title">المنيو <i class="fas fa-utensils" style="color:var(--gold); font-size:1rem;"></i></div>
                <button class="icon-btn" onclick="openSettingsSheet()"><i class="fas fa-ellipsis-v"></i></button>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="filterMenu('all', this)">الكل</button>
                <button class="tab-btn" onclick="filterMenu('sandwich', this)">🥙 سندويشات</button>
                <button class="tab-btn" onclick="filterMenu('kilo', this)">⚖️ لحم بالكيلو</button>
                <button class="tab-btn" onclick="filterMenu('drink', this)">🥤 مشروبات</button>
            </div>
        </div>

        <div class="grid" id="menuGrid">
            <div style="text-align:center; grid-column:1/-1; padding:50px;">جاري التحميل...</div>
        </div>
        <div class="fab" onclick="openItemModal()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="sheet-overlay" id="actionOverlay" onclick="closeAllViews()"></div>
    
    <div class="sheet" id="actionSheet">
        <div class="sheet-indicator"></div>
        <div class="sheet-title" id="actionTitle">خيارات المنتج</div>

        <button class="sheet-btn" onclick="editCurrentItem()">
            <span>تعديل المنتج</span> <i class="fas fa-pen"></i>
        </button>
        <button class="sheet-btn danger" onclick="deleteCurrentItem()">
            <span>حذف نهائي</span> <i class="fas fa-trash"></i>
        </button>
    </div>

    <div class="sheet" id="settingsSheet">
        <div class="sheet-indicator"></div>
        <div class="sheet-title">إعدادات المطعم</div>
        <button class="sheet-btn" onclick="openPhoneModal()">
            <span>الإعدادات العامة (أرقام وصرف)</span> <i class="fas fa-cog"></i>
        </button>
        <button class="sheet-btn" onclick="bulkIncreasePrice()">
            <span>زيادة أسعار (10%)</span> <i class="fas fa-chart-line"></i>
        </button>
        <button class="sheet-btn danger" onclick="signOut(auth)">
            <span>تسجيل الخروج</span> <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>

    <div class="modal" id="itemModal">
        <div class="modal-header">
            <h2 id="modalTitle">إضافة منتج</h2>
            <button class="icon-btn" onclick="closeAllViews()"><i class="fas fa-times"></i></button>
        </div>
        <input type="hidden" id="itemId">
        <div class="form-group">
            <label class="form-label">الاسم</label>
            <input type="text" id="itemName" class="input-field" placeholder="مثال: سندويش روستو">
        </div>
        <div class="form-group">
            <label class="form-label">السعر (ل.ل)</label>
            <input type="number" id="itemPrice" class="input-field" placeholder="0">
        </div>
        <div class="form-group">
            <label class="form-label">النوع</label>
            <select id="itemType" class="input-field">
                <option value="sandwich">سندويش</option>
                <option value="kilo">لحمة (بالكيلو)</option>
                <option value="drink">مشروب</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">رابط الصورة أو الإيموجي (🥩/🥤)</label>
            <input type="text" id="itemImg" class="input-field" placeholder="رابط صورة أو حط إيموجي">
        </div>
        <button class="btn" onclick="saveItem()">حفظ التغييرات</button>
    </div>

    <div class="modal" id="phoneModal">
        <div class="modal-header">
            <h2>الإعدادات العامة</h2>
            <button class="icon-btn" onclick="closeAllViews()"><i class="fas fa-times"></i></button>
        </div>
        <div class="form-group">
            <label class="form-label">سعر صرف الدولار (ل.ل)</label>
            <input type="number" id="exchangeRate" class="input-field" placeholder="89000">
        </div>
        <div class="form-group">
            <label class="form-label">رقم الواتساب (مع الرمز 961)</label>
            <input type="text" id="whatsappNum" class="input-field" placeholder="96170359935">
        </div>
        <div class="form-group">
            <label class="form-label">الرقم الأرضي</label>
            <input type="text" id="phoneNum" class="input-field" placeholder="01382472">
        </div>
        <button class="btn" onclick="saveSettings()">حفظ الإعدادات</button>
    </div>

    <div id="toast">تم بنجاح</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB_U4C880PW4GxZd8FALv8yBSiP2mNeBY",
            authDomain: "malaboushi.firebaseapp.com",
            databaseURL: "https://malaboushi-default-rtdb.firebaseio.com/",
            projectId: "malaboushi",
            storageBucket: "malaboushi.firebasestorage.app",
            messagingSenderId: "110336819350",
            appId: "1:110336819350:web:2b1b0488e72b811f0602b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        window.auth = auth;
        window.signOut = signOut;

        let menuData = [];
        let rawData = {};
        let selectedItemKey = null;
        let currentFilter = 'all';

        // === Helpers ===
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        };

        // === Navigation & Back Button Logic ===
        window.openView = (id) => {
            document.getElementById(id).classList.add('active');
            if(id === 'actionSheet' || id === 'settingsSheet') {
                document.getElementById('actionOverlay').classList.add('active');
            }
            history.pushState({ view: id }, '', '#' + id);
        };

        window.closeAllViews = () => {
            ['actionSheet', 'settingsSheet', 'itemModal', 'phoneModal'].forEach(id => {
                document.getElementById(id).classList.remove('active');
            });
            document.getElementById('actionOverlay').classList.remove('active');
        };

        // إذا كبس اليوزر زر الرجوع بالموبايل
        window.addEventListener('popstate', (e) => {
            closeAllViews(); // سكر كل النوافذ
        });

        // === Auth ===
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
                loadData();
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('admin-section').style.display = 'none';
                closeAllViews();
            }
        });

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(() => alert('بيانات الدخول غلط!'));
        };

        // === Data Load & Render ===
        function loadData() {
            onValue(ref(db, 'menuItems'), (snap) => {
                rawData = snap.val() || {};
                // تحويل لـ Array للترتيب
                menuData = Object.keys(rawData).map(key => ({
                    fbKey: key,
                    ...rawData[key]
                }));
                
                // ترتيب حسب الحقل order (وإذا مو موجود منعتبره 0)
                menuData.sort((a, b) => (a.order || 0) - (b.order || 0));
                renderMenu();
            });
            
            onValue(ref(db, 'settings/contact'), (snap) => {
                const contact = snap.val() || {};
                document.getElementById('whatsappNum').value = contact.whatsapp || '96170359935';
                document.getElementById('phoneNum').value = contact.phone || '01382472';
                document.getElementById('exchangeRate').value = contact.rate || 89000;
            });
        }

        window.filterMenu = (type, btnEl) => {
            currentFilter = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            renderMenu();
        };

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            
            let filtered = currentFilter === 'all' ? menuData : menuData.filter(i => i.type === currentFilter);
            
            if(filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:50px; color:#888;">مافي منتجات بهالقسم</div>';
                return;
            }

            filtered.forEach((item, index) => {
                let visualContent = '';
                if (item.img && item.img.includes('http')) {
                    visualContent = `<img src="${item.img}" style="width:100%; height:100%; object-fit:contain; border-radius:50%;">`;
                } else {
                    let fallbackIcon = item.type === 'drink' ? '🥤' : (item.type === 'kilo' ? '⚖️' : '🍔');
                    visualContent = item.icon || item.img || fallbackIcon;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-key', item.fbKey);
                
                card.innerHTML = `
                    <div class="drag-handle"><i class="fas fa-grip-lines"></i></div>
                    <div class="sort-badge">${index + 1}</div>
                    <div class="card-img">${visualContent}</div>
                    <div class="card-title">${item.name}</div>
                    <div class="card-price">${Number(item.price).toLocaleString()} ل.ل</div>
                `;

                let timer;
                const startPress = () => { timer = setTimeout(() => handleLongPress(item.fbKey, item.name), 500); };
                const cancelPress = () => clearTimeout(timer);
                
                card.addEventListener('touchstart', startPress);
                card.addEventListener('touchend', cancelPress);
                card.addEventListener('touchmove', cancelPress);
                card.addEventListener('mousedown', startPress);
                card.addEventListener('mouseup', cancelPress);
                card.addEventListener('mouseleave', cancelPress);

                grid.appendChild(card);
            });

            // كود تشغيل السحب والإفلات وحفظ الترتيب
            if (window.sortableInstance) window.sortableInstance.destroy();
            window.sortableInstance = new Sortable(grid, {
                handle: '.drag-handle',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: function () {
                    let updates = {};
                    const cards = grid.querySelectorAll('.card');
                    cards.forEach((cardEl, idx) => {
                        let key = cardEl.getAttribute('data-key');
                        updates[`menuItems/${key}/order`] = idx;
                    });
                    
                    update(ref(db), updates).then(() => {
                        showToast('تم حفظ الترتيب الجديد 🚀');
                    });
                }
            });
        }

        // === Actions ===
        window.handleLongPress = (key, name) => {
            if(navigator.vibrate) navigator.vibrate(50);
            selectedItemKey = key;
            document.getElementById('actionTitle').innerText = name;
            openView('actionSheet');
        };

        window.openSettingsSheet = () => openView('settingsSheet');
        window.openPhoneModal = () => { history.back(); setTimeout(()=>openView('phoneModal'), 100); };

        window.openItemModal = (isEdit = false) => {
            if(!isEdit) selectedItemKey = null; // تفريغ المفتاح للإضافة الجديدة
            
            const modal = document.getElementById('itemModal');
            document.getElementById('modalTitle').innerText = isEdit ? 'تعديل المنتج' : 'إضافة منتج جديد';
            
            if(!isEdit) {
                document.getElementById('itemId').value = '';
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                document.getElementById('itemType').value = 'sandwich';
                document.getElementById('itemImg').value = '';
            }
            openView('itemModal');
        };

        window.editCurrentItem = () => {
            history.back(); // تسكير الشيت أولاً
            setTimeout(() => {
                const item = rawData[selectedItemKey];
                document.getElementById('itemId').value = selectedItemKey;
                document.getElementById('itemName').value = item.name;
                document.getElementById('itemPrice').value = item.price;
                document.getElementById('itemType').value = item.type;
                document.getElementById('itemImg').value = item.img || item.icon || '';
                openItemModal(true);
            }, 100);
        };

        window.deleteCurrentItem = () => {
            if(confirm('متأكد بدك تحذف هاد المنتج نهائياً؟')) {
                remove(ref(db, `menuItems/${selectedItemKey}`)).then(() => {
                    history.back();
                    showToast('تم الحذف بنجاح 🗑️');
                });
            }
        };

        // === Saving ===
        window.saveItem = () => {
            const key = document.getElementById('itemId').value;
            const imgInput = document.getElementById('itemImg').value;
            
            const item = {
                name: document.getElementById('itemName').value,
                price: Number(document.getElementById('itemPrice').value),
                type: document.getElementById('itemType').value
            };

            if(imgInput) {
                if(imgInput.length <= 5 && !imgInput.includes('http')) {
                    item.icon = imgInput; item.img = null;
                } else {
                    item.img = imgInput; item.icon = null;
                }
            } else { item.img = null; item.icon = null; }

            if(!item.name || !item.price) return alert('الاسم والسعر مطلوبين!');

            if(key && rawData[key]) {
                item.id = rawData[key].id;
                if(rawData[key].ingredients) item.ingredients = rawData[key].ingredients;
                if(rawData[key].badge) item.badge = rawData[key].badge;
                item.order = rawData[key].order || 0; // الحفاظ على الترتيب
                
                update(ref(db, `menuItems/${key}`), item).then(() => {
                    history.back(); showToast('تم التعديل بنجاح ✅');
                });
            } else {
                item.id = Date.now();
                // وضع المنتج الجديد بالآخر
                item.order = menuData.length > 0 ? Math.max(...menuData.map(o => o.order || 0)) + 1 : 0; 
                if(item.type === 'sandwich') item.ingredients = ["مايونيز","خردل","بندورة","كبيس"];
                
                push(ref(db, 'menuItems'), item).then(() => {
                    history.back(); showToast('تمت الإضافة بنجاح ✅');
                });
            }
        };

        window.saveSettings = () => {
            const data = {
                whatsapp: document.getElementById('whatsappNum').value,
                phone: document.getElementById('phoneNum').value,
                rate: Number(document.getElementById('exchangeRate').value) || 89000
            };
            update(ref(db, 'settings/contact'), data).then(() => {
                history.back(); showToast('تم حفظ الإعدادات ⚙️');
            }).catch(err => alert("خطأ بالحفظ: " + err.message));
        };

        window.bulkIncreasePrice = () => {
            history.back();
            setTimeout(() => {
                if(confirm('رح يتم رفع كل الأسعار (ما عدا البسترما) بنسبة 10%. متأكد؟')) {
                    let updates = {};
                    Object.keys(rawData).forEach(key => {
                        if(!key.includes('basterma') && !rawData[key].name.includes('بسترما')) {
                            let newP = rawData[key].price * 1.10;
                            updates[`menuItems/${key}/price`] = Math.round(newP / 1000) * 1000;
                        }
                    });
                    update(ref(db), updates).then(() => showToast('تم زيادة الأسعار 🚀'));
                }
            }, 100);
        };
    </script>
</body>
</html>
